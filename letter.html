<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fff0f5, #ffe4e1);
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    color: #ff4e78;
    opacity: 0.8;
    animation: floatSmooth linear forwards;
    pointer-events: none;
    z-index: 1;
}

@keyframes floatSmooth {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
}

/* Layout */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    gap: 40px;
    z-index: 2;
    position: relative;
}

/* Rose */
.rose {
    width: 260px;
}

/* Letter */
.letter-wrapper {
    position: relative;
}

.letter-img {
    width: 370px;
    border-radius: 20px;
    transform: rotate(3deg);
}

.text {
    position: absolute;
    top: 15%;
    left: 14%;
    width: 75%;
    font-size: 12px;
    line-height: 1.4.5;
    white-space: pre-line;
}

/* Music button */
.music-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    background: #ff4e78;
    color: white;
    cursor: pointer;
    z-index: 3;
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="Into You - Hiten(MpThree.in).mp3" type="audio/mp3">
</audio>

<div class="container">
    <img src="bg-rmoe-removebg-preview.png" class="rose">

    <div class="letter-wrapper">
        <img src="2.jpeg" class="letter-img">
        <div id="text" class="text"></div>
    </div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>

// 🔒 FLOW CONTROL (fix reload issue)
if (!sessionStorage.getItem("cameFromIndex")) {
    window.location.href = "index.html";
} else {
    sessionStorage.removeItem("cameFromIndex"); // important fix
}

// MESSAGE
const message = `Hey,

Sorry maine rude behave kiya.

Date ke baad main distant ho gaya,
call pe rude tha,
aur jab mila toh bilkul cold behave kiya 
especially exam wale din jo tere liye important tha.

Ab samajh aa raha hai ki maine tujhe hurt kiya.

Main excuse nahi de raha,
bas accept kar raha hu ki galti meri thi.

Main better banne ki try kar raha hu.
shyd mai kabhi-kabhi thoda ajeeb behave
karta hu but in real i love you .

Tu jo feel kar rahi hai woh valid hai.

I’m really sorry.😭😭`;

// Typing effect
let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}
setTimeout(typeWriter, 800);

// Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (12 + Math.random() * 18) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 8000);
}
setInterval(createHeart, 500);

// 🎵 MUSIC (best possible behavior)
window.addEventListener("DOMContentLoaded", () => {
    const music = document.getElementById("music");

    if (localStorage.getItem("playMusic") === "yes") {
        music.play().catch(() => {});
        localStorage.removeItem("playMusic");
    }
});

// fallback (guaranteed play on first tap)
document.addEventListener("click", () => {
    const music = document.getElementById("music");
    if (music.paused) {
        music.play().catch(() => {});
    }
}, { once: true });

// toggle
function toggleMusic() {
    const music = document.getElementById("music");
    if (music.paused) music.play();
    else music.pause();
}

</script>

</body>
</html>
